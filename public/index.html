<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homer Agent</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="sidebar.css">
  <link rel="stylesheet" href="panels.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Bangers&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- LEFT SIDEBAR -->
    <aside id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">&#127849;</div>
        <div class="brand-text">
          <span class="brand-name">Homer Agent</span>
          <span class="brand-version">v1.0</span>
        </div>
      </div>

      <button id="new-conv-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>New Chat</span>
      </button>

      <div class="sidebar-section-label">Recent</div>
      <div id="conv-list"></div>

      <div class="sidebar-footer">
        <div class="sidebar-footer-item" id="sidebar-status">
          <div class="status-indicator online"></div>
          <span>Online</span>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div id="main">
      <!-- TOP BAR -->
      <header id="topbar">
        <div class="topbar-left">
          <button id="sidebar-toggle" title="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <div class="topbar-title">
            <span class="topbar-icon">&#127849;</span>
            <h1>Homer Simpson</h1>
            <span class="topbar-badge">AI Agent</span>
          </div>
        </div>
        <div class="topbar-right">
          <div id="mode-toggle" class="mode-toggle">
            <button class="mode-btn active" data-mode="classic">Classic</button>
            <button class="mode-btn" data-mode="serious">Serious</button>
            <button class="mode-btn" data-mode="dev">Dev</button>
          </div>
          <button id="sound-toggle" class="sound-toggle muted" title="Toggle sounds">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15.54 8.46a5 5 0 010 7.07M19.07 4.93a10 10 0 010 14.14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="panel-toggle" class="topbar-btn" title="Toggle panel">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 1v16" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
        </div>
      </header>

      <!-- CHAT AREA -->
      <div id="chat-area">
        <div id="chat-container">
          <!-- Loading Skeleton -->
          <div id="skeleton-loader" class="skeleton-container">
            <div class="skeleton-msg">
              <div class="skeleton-avatar"></div>
              <div class="skeleton-bubble skeleton-bubble-homer">
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
              </div>
            </div>
            <div class="skeleton-msg skeleton-msg-user">
              <div class="skeleton-bubble skeleton-bubble-user">
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
              </div>
            </div>
            <div class="skeleton-donut">&#127849;</div>
            <div class="skeleton-msg">
              <div class="skeleton-avatar"></div>
              <div class="skeleton-bubble skeleton-bubble-homer">
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
              </div>
            </div>
          </div>

          <div id="messages"></div>
          <div id="typing-indicator" class="hidden">
            <div class="typing-dots">
              <span></span><span></span><span></span>
            </div>
            <span class="typing-phrase" id="typing-phrase">Homer is thinking...</span>
          </div>
        </div>

        <!-- RIGHT PANEL -->
        <aside id="panel" class="panel-open">
          <div class="panel-header">
            <span>Agent Info</span>
            <button id="panel-close" class="panel-close-btn">&times;</button>
          </div>

          <div class="panel-section">
            <div class="panel-card status-card">
              <div class="status-row">
                <div class="status-indicator online"></div>
                <span class="status-text">Online</span>
              </div>
              <div class="status-meta">
                <div class="meta-item">
                  <span class="meta-label">Memory</span>
                  <span class="meta-value"><span id="status-memory-count">0</span> items</span>
                </div>
              </div>
            </div>
          </div>

          <div class="panel-section">
            <div class="panel-section-title">Active Tool</div>
            <div class="panel-card" id="active-tool-card" style="display:none">
              <div class="active-tool-row">
                <div class="tool-pulse"></div>
                <span id="active-tool-name"></span>
              </div>
            </div>
            <div class="panel-card no-tool-card" id="no-tool-msg">
              <span class="no-tool-text">No tool running</span>
            </div>
          </div>

          <div class="panel-section">
            <div class="panel-section-title">Tool Activity</div>
            <div class="panel-card tool-log-card">
              <div id="tool-log-entries"></div>
              <div id="tool-log-empty" class="tool-log-empty">No activity yet</div>
            </div>
          </div>
        </aside>
      </div>

      <!-- INPUT AREA -->
      <footer id="input-area">
        <div id="input-wrapper">
          <textarea
            id="message-input"
            placeholder="Message Homer..."
            rows="1"
            autocomplete="off"
            maxlength="2000"
          ></textarea>
          <button id="send-btn" title="Send message">
            <span class="send-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 10l14-7-4 7 4 7L3 10z" fill="currentColor"/></svg></span>
            <span class="send-spinner"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" stroke-dasharray="31.4 31.4" stroke-linecap="round"/></svg></span>
          </button>
        </div>
        <div class="input-footer">
          <span>Homer Agent can make mistakes. Verify important information.</span>
        </div>
      </footer>
    </div>
  </div>

  <!-- SVG Homer Avatar Expressions (hidden bank) -->
  <svg id="homer-svg-bank" style="display:none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Default / Donut face -->
      <g id="homer-default">
        <circle cx="16" cy="16" r="14" fill="#FDD835" stroke="#E6B800" stroke-width="1"/>
        <circle cx="12" cy="13" r="2.5" fill="white"/><circle cx="12" cy="13" r="1.2" fill="#1A1A1A"/>
        <circle cx="20" cy="13" r="2.5" fill="white"/><circle cx="20" cy="13" r="1.2" fill="#1A1A1A"/>
        <ellipse cx="16" cy="21" rx="4" ry="2.5" fill="#E6B800"/>
        <path d="M13 20 Q16 24 19 20" stroke="#1A1A1A" stroke-width="0.8" fill="none"/>
      </g>
      <!-- Happy / Woohoo -->
      <g id="homer-happy">
        <circle cx="16" cy="16" r="14" fill="#FDD835" stroke="#E6B800" stroke-width="1"/>
        <circle cx="12" cy="12" r="2.5" fill="white"/><circle cx="12" cy="11" r="1.2" fill="#1A1A1A"/>
        <circle cx="20" cy="12" r="2.5" fill="white"/><circle cx="20" cy="11" r="1.2" fill="#1A1A1A"/>
        <path d="M10 19 Q16 26 22 19" stroke="#1A1A1A" stroke-width="1" fill="none"/>
        <line x1="8" y1="9" x2="12" y2="10" stroke="#E6B800" stroke-width="1" stroke-linecap="round"/>
        <line x1="24" y1="9" x2="20" y2="10" stroke="#E6B800" stroke-width="1" stroke-linecap="round"/>
      </g>
      <!-- D'oh / Frustrated -->
      <g id="homer-doh">
        <circle cx="16" cy="16" r="14" fill="#FDD835" stroke="#E6B800" stroke-width="1"/>
        <circle cx="12" cy="14" r="2.5" fill="white"/><circle cx="12" cy="15" r="1.2" fill="#1A1A1A"/>
        <circle cx="20" cy="14" r="2.5" fill="white"/><circle cx="20" cy="15" r="1.2" fill="#1A1A1A"/>
        <path d="M12 22 Q16 19 20 22" stroke="#1A1A1A" stroke-width="1" fill="none"/>
        <line x1="9" y1="10" x2="14" y2="12" stroke="#E6B800" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="23" y1="10" x2="18" y2="12" stroke="#E6B800" stroke-width="1.2" stroke-linecap="round"/>
      </g>
      <!-- Thinking / Mmm -->
      <g id="homer-thinking">
        <circle cx="16" cy="16" r="14" fill="#FDD835" stroke="#E6B800" stroke-width="1"/>
        <circle cx="12" cy="13" r="2.5" fill="white"/><circle cx="12" cy="12" r="1.2" fill="#1A1A1A"/>
        <circle cx="20" cy="13" r="2.5" fill="white"/><circle cx="21" cy="12" r="1.2" fill="#1A1A1A"/>
        <ellipse cx="17" cy="21" rx="3" ry="2" fill="#E6B800"/>
        <path d="M15 20 Q17 22 19 20" stroke="#1A1A1A" stroke-width="0.8" fill="none"/>
      </g>
      <!-- Angry / Why you little -->
      <g id="homer-angry">
        <circle cx="16" cy="16" r="14" fill="#FDD835" stroke="#E6B800" stroke-width="1"/>
        <circle cx="12" cy="14" r="2.5" fill="white"/><circle cx="12" cy="14" r="1.5" fill="#1A1A1A"/>
        <circle cx="20" cy="14" r="2.5" fill="white"/><circle cx="20" cy="14" r="1.5" fill="#1A1A1A"/>
        <line x1="8" y1="12" x2="14" y2="10" stroke="#E6B800" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="24" y1="12" x2="18" y2="10" stroke="#E6B800" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M12 22 Q16 19 20 22" stroke="#1A1A1A" stroke-width="1.2" fill="none"/>
      </g>
      <!-- Sleepy -->
      <g id="homer-sleepy">
        <circle cx="16" cy="16" r="14" fill="#FDD835" stroke="#E6B800" stroke-width="1"/>
        <path d="M9 13 Q12 11 15 13" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M17 13 Q20 11 23 13" stroke="#1A1A1A" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <ellipse cx="16" cy="21" rx="3" ry="2" fill="#E6B800"/>
        <text x="21" y="8" font-size="5" fill="#42A5F5" font-weight="700">Z</text>
        <text x="24" y="5" font-size="4" fill="#42A5F5" font-weight="700">z</text>
      </g>
      <!-- Beer / Duff -->
      <g id="homer-beer">
        <circle cx="16" cy="16" r="14" fill="#FDD835" stroke="#E6B800" stroke-width="1"/>
        <circle cx="12" cy="13" r="2.5" fill="white"/><circle cx="12" cy="12" r="1.2" fill="#1A1A1A"/>
        <circle cx="20" cy="13" r="2.5" fill="white"/><circle cx="20" cy="12" r="1.2" fill="#1A1A1A"/>
        <path d="M10 19 Q16 26 22 19" stroke="#1A1A1A" stroke-width="1" fill="none"/>
        <rect x="22" y="17" width="5" height="7" rx="1" fill="#E6B800" stroke="#1A1A1A" stroke-width="0.5"/>
        <ellipse cx="24.5" cy="17" rx="2.5" ry="1" fill="white" opacity="0.6"/>
      </g>
    </defs>
  </svg>

  <script src="app.js"></script>
  <script src="sidebar.js"></script>
  <script src="panels.js"></script>
</body>
</html>
